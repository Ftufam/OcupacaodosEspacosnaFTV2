<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocupação dos Espaços da FT — 2026/1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:     #0a1628;
  --navy2:    #112240;
  --navy3:    #1a3456;
  --blue:     #1d6fa4;
  --blue2:    #2389c8;
  --sky:      #38bdf8;
  --gold:     #f4b942;
  --gold2:    #e8a220;
  --teal:     #0ea5a0;
  --green:    #10b981;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --bg:       #f0f4f9;
  --surface:  #ffffff;
  --surface2: #f7fafd;
  --border:   #dde6f0;
  --text:     #0f172a;
  --text2:    #475569;
  --text3:    #94a3b8;
  --shadow-sm: 0 1px 4px rgba(10,22,40,.07);
  --shadow:    0 4px 16px rgba(10,22,40,.1);
  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(29,111,164,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(14,165,160,.08) 0%, transparent 60%),
    var(--bg);
}

/* ── HEADER ─────────────────────────────────── */
.page-header {
  background: #ffffff;
  color: var(--text);
  padding: 0 36px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
  min-height: 96px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(10,22,40,.10);
}
.page-header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--gold), var(--gold2), var(--blue));
}
.logo-wrap { display: flex; align-items: center; }
.logo-wrap img {
  height: 68px; width: auto;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,.12));
  transition: transform .2s;
}
.logo-wrap img:hover { transform: scale(1.04); }
.header-center { text-align: center; position: relative; z-index: 1; }
.header-center h1 {
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  font-weight: 800;
  letter-spacing: -0.01em;
  line-height: 1.2;
  background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 50%, #c8860a 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-badge {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 12px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--blue);
  text-transform: uppercase;
}

/* ── MAIN ───────────────────────────────────── */
.main { max-width: 1500px; margin: 0 auto; padding: 28px 20px 40px; }

/* ── TABS ROW ───────────────────────────────── */
.tabs-row {
  display: flex;
  align-items: flex-end;
  gap: 0;
  flex-wrap: wrap;
  margin-bottom: 0;
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 12px 26px;
  border: 1.5px solid #bfdbfe;
  border-bottom: none;
  background: #dbeafe;
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  color: #0f172a;
  border-radius: 10px 10px 0 0;
  transition: all .2s;
  position: relative;
  bottom: -1px;
  letter-spacing: .01em;
  text-decoration: none;
}
.tab-btn .tab-icon { font-size: 1.1rem; }
.tab-btn:hover { background: #bfdbfe; border-color: var(--blue); color: #0f172a; }
.tab-btn.active {
  background: var(--surface);
  color: var(--navy);
  border-color: var(--border);
  border-bottom-color: var(--surface);
  box-shadow: 0 -4px 12px rgba(10,22,40,.07);
  z-index: 1;
}
.tab-btn.active::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  border-radius: 10px 10px 0 0;
  background: linear-gradient(90deg, var(--blue), var(--sky));
}

/* Botão Avalie o Serviço */
.btn-avalie {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  border: 1.5px solid var(--gold2);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  font-size: .84rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  letter-spacing: .01em;
  bottom: -1px;
  position: relative;
  box-shadow: 0 2px 8px rgba(232,162,32,.25);
  transition: all .2s;
}
.btn-avalie:hover {
  background: linear-gradient(135deg, #c8860a, var(--gold2));
  box-shadow: 0 4px 16px rgba(232,162,32,.4);
  transform: translateY(-1px);
}
.btn-avalie .btn-icon { font-size: 1rem; }

/* ── PANEL ──────────────────────────────────── */
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.panel-inner {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-top: none;
  border-radius: 0 var(--r) var(--r) var(--r);
  padding: 24px;
  box-shadow: var(--shadow);
}

/* ── CARDS ──────────────────────────────────── */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s, transform .2s;
  position: relative;
  overflow: hidden;
}
.card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.card-taxa::before  { background: linear-gradient(90deg, var(--blue), var(--sky)); }
.card-ocup::before  { background: linear-gradient(90deg, var(--teal), var(--green)); }
.card-disp::before  { background: linear-gradient(90deg, var(--gold), var(--amber)); }
.card-esp::before   { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
.card-label { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); }
.card-value { font-size: 2rem; font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
.card-taxa .card-value { color: var(--blue); }
.card-ocup .card-value { color: var(--teal); }
.card-disp .card-value { color: var(--gold2); }
.card-esp  .card-value { color: #7c3aed; }
.card-sub  { font-size: .7rem; color: var(--text3); }

/* ── PROGRESS ───────────────────────────────── */
.progress-wrap {
  margin-bottom: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.progress-label { font-size: .75rem; font-weight: 600; color: var(--text2); white-space: nowrap; }
.progress-track { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.progress-pct { font-family: 'JetBrains Mono', monospace; font-size: .8rem; font-weight: 600; color: var(--blue); min-width: 46px; text-align: right; }

/* ── TABLE ──────────────────────────────────── */
.table-wrapper {
  overflow: auto;
  max-height: 58vh;
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
}
table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
thead tr th {
  background: var(--navy);
  color: rgba(255,255,255,.92);
  padding: 10px 6px;
  text-align: center;
  font-family: 'Sora', sans-serif;
  font-size: .66rem;
  font-weight: 600;
  letter-spacing: .03em;
  white-space: normal;
  word-break: break-word;
  min-width: 64px;
  border-right: 1px solid rgba(255,255,255,.08);
  border-bottom: 2px solid var(--navy3);
  position: sticky; top: 0; z-index: 2;
}
thead tr th:first-child {
  min-width: 148px; text-align: left; padding-left: 14px;
  position: sticky; left: 0; z-index: 3;
  border-right: 2px solid rgba(255,255,255,.15);
}
thead tr th:nth-child(2) { background: var(--navy2); color: var(--sky); min-width: 72px; }
thead tr th:nth-child(3) { min-width: 52px; }

tbody tr td {
  padding: 6px 6px;
  text-align: center;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  word-break: break-word;
  max-width: 130px;
  font-size: .68rem;
  background: var(--surface);
  transition: background .1s;
}
tbody tr:nth-child(even) td { background: var(--surface2); }
tbody tr:hover td { background: #e8f3fd !important; }

tbody tr td:first-child {
  text-align: left; font-size: .78rem; font-weight: 700; color: var(--navy);
  padding-left: 14px;
  position: sticky; left: 0; z-index: 1;
  border-right: 2px solid var(--border);
}
tbody tr:nth-child(even) td:first-child { background: var(--surface2); }
tbody tr:nth-child(odd)  td:first-child { background: var(--surface); }
tbody tr:hover td:first-child { background: #dbeafe !important; }

td.col-taxa { padding: 4px 6px; }
.badge-taxa {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 3px 8px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem; font-weight: 600; min-width: 54px;
}
.badge-taxa.low  { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.badge-taxa.mid  { background: #fefce8; color: #92400e; border: 1px solid #fde68a; }
.badge-taxa.high { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
.badge-taxa.full { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

td.col-cap { color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: .7rem; font-weight: 500; }

.chip {
  display: inline-block;
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  color: #1e3a8a;
  border: 1px solid #bfdbfe;
  border-radius: 5px;
  padding: 2px 5px;
  font-size: .62rem;
  line-height: 1.35;
  font-weight: 500;
  text-align: left;
  word-break: break-word;
  white-space: normal;
}

/* ── LEGEND ─────────────────────────────────── */
.legend {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  margin-top: 16px; padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: .7rem; color: var(--text2);
}
.legend-title { font-weight: 700; color: var(--text); margin-right: 4px; }
.leg { display: flex; align-items: center; gap: 5px; }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

/* ── RESPONSIVE ─────────────────────────────── */
@media (max-width: 1024px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .page-header { padding: 0 16px; min-height: 80px; gap: 12px; }
  .logo-wrap img { height: 50px; }
  .header-center h1 { font-size: .95rem; }
  .tab-btn { padding: 10px 14px; font-size: .8rem; }
  .tab-btn .tab-label { display: none; }
  .btn-avalie .btn-label { display: none; }
  .btn-avalie { padding: 10px 12px; }
  .panel-inner { padding: 14px; }
  .table-wrapper { max-height: 50vh; }
}
@media (max-width: 480px) {
  .page-header { grid-template-columns: auto 1fr auto; }
  .logo-wrap img { height: 40px; }
  .cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .card-value { font-size: 1.5rem; }
  .tabs-row { gap: 0; flex-wrap: wrap; }
  .btn-avalie { width: 100%; justify-content: center; border-radius: 8px; margin-left: 0; margin-top: 6px; bottom: 0; }
}
</style>

function taxaClass(v) {
  if (v >= 90) return 'full';
  if (v >= 60) return 'high';
  if (v >= 30) return 'mid';
  return 'low';
}
function barColor(v) {
  if (v >= 80) return 'linear-gradient(90deg,#ef4444,#f97316)';
  if (v >= 50) return 'linear-gradient(90deg,#f59e0b,#fbbf24)';
  return 'linear-gradient(90deg,#1d6fa4,#38bdf8)';
}
function buildPanel(turno) {
  const d = DATA[turno];
  const taxa = d.taxa_geral;
  const disp = d.total_slots - d.occupied_slots;

  const cards = `<div class="cards">
    <div class="card card-taxa">
      <div class="card-label">Taxa Geral de Ocupação</div>
      <div class="card-value">${taxa}%</div>
      <div class="card-sub">ocupação no turno ${turno.toLowerCase()}</div>
    </div>
    <div class="card card-ocup">
      <div class="card-label">Slots Ocupados</div>
      <div class="card-value">${d.occupied_slots}</div>
      <div class="card-sub">horários com alocação</div>
    </div>
    <div class="card card-disp">
      <div class="card-label">Slots Disponíveis</div>
      <div class="card-value">${disp}</div>
      <div class="card-sub">horários livres</div>
    </div>
    <div class="card card-esp">
      <div class="card-label">Espaços Cadastrados</div>
      <div class="card-value">${d.rows.length}</div>
      <div class="card-sub">locais monitorados</div>
    </div>
  </div>`;

  const progress = `<div class="progress-wrap">
    <span class="progress-label">Ocupação geral do turno</span>
    <div class="progress-track">
      <div class="progress-bar" style="width:${taxa}%;background:${barColor(taxa)}"></div>
    </div>
    <span class="progress-pct">${taxa}%</span>
  </div>`;

  let thead = '<thead><tr><th>LOCAL</th><th>Taxa<br>Local</th><th>Cap.</th>';
  d.time_cols.forEach(col => {
    const short = col.replace('2a e 4a:','2/4').replace('3a e 5a:','3/5').replace('6a:','6a').replace(' ','');
    thead += `<th title="${col}">${short}</th>`;
  });
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  d.rows.forEach(row => {
    tbody += '<tr>';
    tbody += `<td>${row.LOCAL}</td>`;
    const tv = row['Taxa Local'];
    tbody += `<td class="col-taxa"><span class="badge-taxa ${taxaClass(tv)}">${tv}%</span></td>`;
    tbody += `<td class="col-cap">${row.CAPMAXESP ?? ''}</td>`;
    d.time_cols.forEach(col => {
      const val = row[col] || '';
      tbody += val ? `<td><span class="chip">${val}</span></td>` : '<td></td>';
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  const legend = `<div class="legend">
    <span class="legend-title">Taxa Local:</span>
    <span class="leg"><span class="leg-dot" style="background:#bbf7d0"></span>0–29% baixa</span>
    <span class="leg"><span class="leg-dot" style="background:#fde68a"></span>30–59% moderada</span>
    <span class="leg"><span class="leg-dot" style="background:#fed7aa"></span>60–89% alta</span>
    <span class="leg"><span class="leg-dot" style="background:#fecaca"></span>≥90% crítica</span>
  </div>`;

  return `<div class="panel-inner">${cards}${progress}<div class="table-wrapper"><table>${thead}${tbody}</table></div>${legend}</div>`;
}

function showTab(turno, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('tab-' + turno);
  if (!panel.innerHTML) panel.innerHTML = buildPanel(turno);
  panel.classList.add('active');
}

document.getElementById('tab-Matutino').innerHTML = buildPanel('Matutino');
